<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Home</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial;
    background: #f4f6f8;
  }

  header {
    background: #222;
    color: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }

  .logo { font-size: 18px; font-weight: bold; }

  .nav {
    display: flex;
    gap: 16px;
  }

  .nav a {
    color: white;
    text-decoration: none;
    font-size: 14px;
  }

  .menu-btn {
    display: none;
    font-size: 20px;
    cursor: pointer;
  }

  .mobile-menu {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #333;
    display: none;
    flex-direction: column;
  }

  .mobile-menu a {
    padding: 12px;
    border-bottom: 1px solid #444;
    color: white;
    text-decoration: none;
  }

  .mobile-menu.show {
    display: flex;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    padding: 20px;
    max-width: 1100px;
    margin: auto;
  }

  .post {
    background: white;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 16px;
    transition: 0.2s;
  }

  .post:hover {
    transform: translateY(-3px);
  }

  .post h3 {
    margin-bottom: 10px;
  }

  .sidebar {
    background: white;
    padding: 16px;
    border-radius: 12px;
    height: fit-content;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .tag {
    display: inline-block;
    background: #eee;
    padding: 4px 8px;
    border-radius: 6px;
    margin: 4px;
    font-size: 12px;
  }

  /* 移动端 */
  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
    }

    .sidebar {
      order: -1;
    }

    .nav {
      display: none;
    }

    .menu-btn {
      display: block;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">MyBlog</div>

  <div class="nav">
    <a href="#">首页</a>
    <a href="#">分类</a>
    <a href="#">标签</a>
    <a href="#">关于</a>
  </div>

  <div class="menu-btn" id="menuBtn">☰</div>

  <div class="mobile-menu" id="mobileMenu">
    <a href="#">首页</a>
    <a href="#">分类</a>
    <a href="#">标签</a>
    <a href="#">关于</a>
  </div>
</header>

<div class="container">
  <div>
    <div class="post">
      <h3>如何学习前端？</h3>
      <p>从 HTML + CSS + JS 开始，逐步深入框架与工程化。</p>
    </div>

    <div class="post">
      <h3>CSS 布局总结</h3>
      <p>Flex、Grid 是现代布局核心。</p>
    </div>

    <div class="post">
      <h3>JS 动画技巧</h3>
      <p>FLIP 动画可以实现高性能列表动画。</p>
    </div>
  </div>

  <div class="sidebar">
    <h4>标签</h4>
    <div>
      <span class="tag">前端</span>
      <span class="tag">CSS</span>
      <span class="tag">JavaScript</span>
      <span class="tag">算法</span>
    </div>
  </div>
</div>

<script>
const btn = document.getElementById('menuBtn');
const menu = document.getElementById('mobileMenu');

btn.addEventListener('click', () => {
  menu.classList.toggle('show');
});

// 点击外部关闭
window.addEventListener('click', (e) => {
  if (!menu.contains(e.target) && e.target !== btn) {
    menu.classList.remove('show');
  }
});
</script>

</body>
</html>
