<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Dropdown Menu</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    font-family: Arial, sans-serif;
  }

  .dropdown {
    position: relative;
  }

  .trigger {
    padding: 10px 16px;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-weight: bold;
  }

  .menu {
    position: absolute;
    top: 120%;
    left: 0;
    min-width: 160px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    transition: 0.25s;
    overflow: hidden;
  }

  .menu.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .item {
    padding: 10px 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  .item:hover {
    background: #f0f0f0;
  }
</style>
</head>
<body>

<div class="dropdown">
  <div class="trigger" id="trigger">菜单 ▼</div>
  <div class="menu" id="menu">
    <div class="item">个人中心</div>
    <div class="item">设置</div>
    <div class="item">退出登录</div>
  </div>
</div>

<script>
const trigger = document.getElementById('trigger');
const menu = document.getElementById('menu');

// 切换显示
trigger.addEventListener('click', (e) => {
  e.stopPropagation();
  menu.classList.toggle('show');
});

// 点击外部关闭
document.addEventListener('click', () => {
  menu.classList.remove('show');
});

// 阻止菜单内部点击冒泡
menu.addEventListener('click', (e) => {
  e.stopPropagation();
});
</script>

</body>
</html>
