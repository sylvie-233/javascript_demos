<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Toast Notification</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: Arial, sans-serif;
  }

  button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-weight: bold;
  }

  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 9999;
  }

  .toast {
    min-width: 220px;
    padding: 12px 16px;
    border-radius: 10px;
    color: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateX(100%);
    animation: slideIn 0.3s forwards, fadeOut 0.3s forwards 2.7s;
  }

  .toast.success { background: #4CAF50; }
  .toast.error { background: #f44336; }
  .toast.info { background: #2196F3; }

  @keyframes slideIn {
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  @keyframes fadeOut {
    to {
      opacity: 0;
      transform: translateX(100%);
    }
  }
</style>
</head>
<body>

<button onclick="showToast('操作成功', 'success')">成功提示</button>
<button onclick="showToast('发生错误', 'error')">错误提示</button>
<button onclick="showToast('这是一条消息', 'info')">信息提示</button>

<div id="toastContainer" class="toast-container"></div>

<script>
const container = document.getElementById('toastContainer');

function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;

  container.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}
</script>

</body>
</html>
