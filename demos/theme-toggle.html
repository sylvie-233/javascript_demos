<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Theme Toggle</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #222;
    --card: #f5f5f5;
  }

  body.dark {
    --bg: #1e1e1e;
    --text: #f0f0f0;
    --card: #2c2c2c;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg);
    color: var(--text);
    font-family: Arial;
    transition: 0.3s;
  }

  .card {
    padding: 30px;
    border-radius: 16px;
    background: var(--card);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    text-align: center;
    transition: 0.3s;
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="card">
  <h2>主题切换 Demo</h2>
  <p>点击按钮切换白天 / 夜间模式</p>
  <button id="toggle">切换主题</button>
</div>

<script>
/*
主题切换核心是通过切换CSS变量值来实现的
*/
const btn = document.getElementById('toggle');

// 初始化（读取本地存储）
if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
}

btn.addEventListener('click', () => {
  document.body.classList.toggle('dark');

  // 保存状态
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});
</script>

</body>
</html>
